<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carregando post...</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "7839603b0b7341f6be8508063bbb734a"}'></script><!-- End Cloudflare Web Analytics -->
</head>
<body>
  <header>
    <h1>Blog do Patrick</h1>
    
    <!-- Botão de tema -->
    <div class="theme-switch-wrapper">
      <label class="theme-switch">
        <input type="checkbox" id="theme-toggle">
        <span class="slider round"></span>
      </label>
      <span class="theme-label">Neon Dark</span>
    </div>
    <button class="back-link-post" onclick="history.back()">← Voltar para a lista de posts</button>
  </header>

  <main id="post-container">
    <p>Carregando post...</p>
  </main>

  <div class="interactions" style="margin-top: 48px; padding: 24px; border-top: 1px solid var(--neon-green-border);">
    <div class="likes-section" style="margin-bottom: 32px;">
      <button id="like-btn" class="like-btn" style="font-size: 1.3rem; background: none; border: none; color: var(--neon-green); cursor: pointer;">
        🤍 <span id="likes-count">0</span> likes
      </button>
    </div>

    <h3 style="margin: 0 0 16px; color: var(--neon-green-light);">Comentários</h3>
    <div id="comments-list" style="max-height: 400px; overflow-y: auto; margin-bottom: 24px;"></div>

    <div style="display: flex; gap: 12px;">
      <textarea id="comment-input" placeholder="Deixe seu comentário..." rows="3" style="flex:1; padding:12px; background:rgba(0,255,65,0.05); border:1px solid var(--neon-green-border); color:var(--neon-green); border-radius:6px;"></textarea>
      <button onclick="submitComment()" style="padding:12px 24px; background:var(--neon-green); color:#000; border:none; border-radius:6px; cursor:pointer;">Enviar</button>
    </div>
  </div>

  <footer>
    <p>Feito com <svg class="heart-svg" width="1em" height="1em" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg> e JSON | <a href="https://webpatrickworks.github.io/blog-patrick">Código-fonte</a></p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // Theme switcher (copiado/adaptado do main.js)
    document.addEventListener('DOMContentLoaded', () => {
      const toggle = document.getElementById('theme-toggle');
      const label = document.querySelector('.theme-label');
      
      if (!toggle || !label) return; // segurança caso não encontre os elementos

      // Carrega tema salvo (ou usa neon como default)
      const currentTheme = localStorage.getItem('theme') || 'neon';
      document.documentElement.setAttribute('data-theme', currentTheme);
      
      if (currentTheme === 'modern') {
        toggle.checked = true;
        label.textContent = 'Modern Tech';
      } else if (currentTheme === 'light') {
        toggle.checked = true;
        label.textContent = 'Light Mode';
      } else {
        toggle.checked = false;
        label.textContent = 'Neon Dark';
      }

      toggle.addEventListener('change', () => {
        let theme;
        if (toggle.checked) {
          // Alterna: modern → light → neon (ou só modern ↔ neon se preferir)
          if (document.documentElement.getAttribute('data-theme') === 'modern') {
            theme = 'light';
            label.textContent = 'Light Mode';
          } else {
            theme = 'modern';
            label.textContent = 'Modern Tech';
          }
        } else {
          theme = 'neon';
          label.textContent = 'Neon Dark';
        }
        
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
      });
    });
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const postId = urlParams.get('id');

      if (!postId) {
        document.getElementById('post-container').innerHTML = '<p>Post não encontrado (sem ID na URL).</p>';
        return;
      }

      fetch('data/posts.json')
        .then(response => response.json())
        .then(posts => {
          const post = posts.find(p => p.id == postId);
          console.log('Post encontrado:', post);

          const container = document.getElementById('post-container');
          if (!post) {
            container.innerHTML = '<p>Post não encontrado.</p>';
            return;
          }
          
          container.innerHTML = '';
          document.title = post.title + ' | Blog do Patrick';

          // PRIMEIRO: limpa o content (não depende de data)
          let cleanContent = post.content.replace(/^<h1>.*?<\/h1>\s*/i, '').trim();
          console.log('cleanContent length:', cleanContent.length);
          console.log('cleanContent starts with:', cleanContent.substring(0, 200));

          // SEGUNDO: calcula data e disclaimer (agora post existe)
          let disclaimerHTML = '';
          const postDateObj = new Date(post.date);

          if (isNaN(postDateObj.getTime())) {
            console.warn('Data inválida no post:', post.date);
            disclaimerHTML = '<div class="outdated-banner">Data de publicação inválida.</div>';
          } else {
            const now = new Date();
            const daysOld = Math.floor((now - postDateObj) / (1000 * 60 * 60 * 24));
            const isOutdated = daysOld >= 7;  // ou FRESH_DAYS se você definir como const global

            if (isOutdated) {
              const formattedDate = postDateObj.toLocaleDateString('pt-BR', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
              });

              disclaimerHTML = `
                <div class="outdated-banner">
                  <strong>Aviso importante:</strong><br>
                  Esta notícia foi publicada em ${formattedDate} (${daysOld} dias atrás) e <strong>pode estar desatualizada</strong>.<br>
                  Verifique as fontes originais (linkadas no artigo) ou busque notícias recentes para o status atual.<br>
                  O Blog do Patrick não se responsabiliza por decisões baseadas em informações obsoletas.
                </div>
              `;
            }
          }

          // TERCEIRO: cria postDate para o <time> (versão sem timezone issues)
          const [year, month, day] = post.date.split('-');
          const postDate = new Date(Number(year), Number(month) - 1, Number(day));
          console.log('postDate criado:', postDate.toISOString());

          // Monte o DOM
          const article = document.createElement('article');
          article.className = 'post-content';

          // Header
          const header = document.createElement('div');
          header.className = 'post-header';
          header.innerHTML = `
            <h1>${post.title}</h1>
            <time datetime="${post.date}">
              ${postDate.toLocaleDateString('pt-BR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}
            </time>
            <button id="share-btn" class="share-btn">🔗 Compartilhar</button>
          `;
          article.appendChild(header);

          // Disclaimer
          if (disclaimerHTML) {
            const bannerDiv = document.createElement('div');
            bannerDiv.innerHTML = disclaimerHTML;
            article.appendChild(bannerDiv.firstElementChild || bannerDiv);  // mais seguro
          }

          // Content
          const contentDiv = document.createElement('div');
          contentDiv.className = 'content';
          contentDiv.innerHTML = cleanContent;
          article.appendChild(contentDiv);

          container.appendChild(article);


          // ==================== SUPABASE – Likes & Comentários ====================

          const SUPABASE_URL    = 'https://yegczfbshkctxedzkdpu.supabase.co';      // ← substitua
          const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InllZ2N6ZmJzaGtjdHhlZHprZHB1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjYyMzc1OTUsImV4cCI6MjA4MTgxMzU5NX0.GU7KfJ4J1gAGK_q_uyYNPsPWqYbXjU2qdVhZq8SsIdM'; // ← substitua

          const supabaseClient = supabase.createClient(
            SUPABASE_URL,
            SUPABASE_ANON_KEY
          );
          // Função auxiliar: contar likes
          async function updateLikeCount() {
            const { count, error } = await supabaseClient
              .from('post_likes')
              .select('*', { count: 'exact', head: true })
              .eq('post_id', postId);

            if (error) {
              console.error('Erro ao contar likes:', error);
              return;
            }

            const likesEl = document.getElementById('likes-count');
            if (likesEl) likesEl.textContent = count || 0;
          }

          // Toggle like
          async function toggleLike() {
            const { error } = await supabaseClient
              .from('post_likes')
              .insert({ post_id: postId });

            if (error) {
              console.error('Erro ao registrar like:', error);
              return;
            }

            updateLikeCount();
          }

          // ==================== COMENTÁRIOS ====================

          async function loadComments() {

            const { data, error } = await supabaseClient
              .from('post_comments')
              .select('id, author_name, content, created_at')
              .eq('post_id', postId)
              .order('created_at', { ascending: true });

            if (error) {
              console.error('Erro ao carregar comentários:', error);
              return;
            }

            const container = document.getElementById('comments-list');
            if (!container) return;

            container.innerHTML = '';

            data.forEach(comment => {
              const div = document.createElement('div');
              div.className = 'comment';

              div.innerHTML = `
                <strong>${comment.author_name}</strong>
                <small>(${new Date(comment.created_at).toLocaleString('pt-BR')})</small>
                <p>${comment.content.replace(/\n/g, '<br>')}</p>
              `;

              container.appendChild(div);
            });
          }
          async function submitComment() {
            const input = document.getElementById('comment-input');
            const content = input?.value.trim();

            if (!content) return;

            const name = prompt('Seu nome (ou deixe em branco para Anônimo):') || 'Anônimo';

            const { error } = await supabaseClient.from('post_comments').insert({
              post_id: postId,
              author_name: name,
              content
            });

            if (error) {
              alert('Erro ao enviar comentário: ' + error.message);
            } else {
              input.value = '';
              // O realtime vai atualizar a lista
            }
          }

          window.submitComment = submitComment;

          // ==================== REALTIME ====================

          function setupRealtime() {
            // Likes
            supabaseClient
              .channel(`likes-changes:${postId}`)
              .on('postgres_changes', 
                { event: '*', schema: 'public', table: 'post_likes', filter: `post_id=eq.${postId}` },
                () => updateLikeCount()
              )
              .subscribe();

            // Comentários novos
            supabaseClient
              .channel(`comments-changes:${postId}`)
              .on('postgres_changes', 
                { event: 'INSERT', schema: 'public', table: 'post_comments', filter: `post_id=eq.${postId}` },
                (payload) => {
                  const comment = payload.new;
                  const container = document.getElementById('comments-list');
                  const div = document.createElement('div');
                  div.className = 'comment-card';

                  div.innerHTML = `
                    <div class="comment-header">
                      <strong>${comment.author_name || 'Anônimo'}</strong>
                      <small>(${new Date(comment.created_at).toLocaleString('pt-BR', {
                        dateStyle: 'short', timeStyle: 'short'
                      })})</small>
                    </div>
                    <p class="comment-content">${comment.content.replace(/\n/g, '<br>')}</p>
                  `;
                  container.appendChild(div);
                }
              )
              .subscribe();
          }

          document.getElementById('like-btn')?.addEventListener('click', toggleLike);

          // ==================== INICIALIZAÇÃO ====================

          // Coloque isso depois de montar o article
          setTimeout(() => {
            updateLikeCount();
            loadComments();
            setupRealtime();
          }, 50);

          // Botão voltar
          const backBtn = document.createElement('button');
          backBtn.className = 'back-link-post';
          backBtn.textContent = '← Voltar para a lista de posts';
          backBtn.onclick = () => history.back();
          container.appendChild(backBtn);

          // Share
          const shareBtn = document.getElementById('share-btn');
          shareBtn.addEventListener('click', () => {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
              const original = shareBtn.innerHTML;
              shareBtn.innerHTML = '✅ Link copiado!';
              shareBtn.style.background = 'var(--neon-green)';
              shareBtn.style.color = '#000';
              setTimeout(() => {
                shareBtn.innerHTML = original;
                shareBtn.style.background = '';
                shareBtn.style.color = '';
              }, 2200);
            }).catch(() => {
              alert('Erro ao copiar o link. Tente novamente.');
            });
          });

          console.log('Montagem do DOM concluída sem erro');
        })
        .catch(error => {
          console.error('Catch acionado com erro:', error);
          document.getElementById('post-container').innerHTML =
            '<p>Erro ao carregar o post.</p>';
        });
    });
  </script>

</body>
</html>
