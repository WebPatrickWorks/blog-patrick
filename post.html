<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carregando post...</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "7839603b0b7341f6be8508063bbb734a"}'></script><!-- End Cloudflare Web Analytics -->
</head>
<body>
  <header>
    <h1>Centro Oculto</h1>
    <button class="back-link-post" onclick="history.back()">← Voltar para a lista de posts</button>
  </header>

  <main id="post-container">
    <p>Carregando post...</p>
  </main>

  <div class="interactions">
    <div class="likes-section">
      <button id="like-btn" class="like-btn">
        🤍 <span id="likes-count">0</span>
      </button>
    </div>

    <h3 class="comments-heading">Comentários</h3>
    <div id="comments-list" class="comment-card-main"></div>

    <div class="comment-form">
      <textarea
        id="comment-input"
        class="comment-input"
        placeholder="Deixe seu comentário..."
        rows="3"
      ></textarea>

      <button onclick="submitComment()" class="comment-submit">
        Enviar
      </button>
    </div>
  </div>

  <footer>
    <p>Feito com <svg class="heart-svg" width="1em" height="1em" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg> e JSON | <a href="https://centrooculto.com">Código-fonte</a></p>
  </footer>

    <!-- ==================== CHAT DA GRO ==================== -->
  <div id="gro-chat-button">Falar com a Gro</div>

  <div id="gro-chat-panel">
    <div id="gro-chat-header">
      <span>Gro</span>
      <button id="gro-chat-close" type="button">×</button>
    </div>

    <div id="gro-chat-messages"></div>

    <div id="gro-chat-input-area">
      <input id="gro-chat-input" type="text" placeholder="Digite sua mensagem..." />
      <button id="gro-chat-send" type="button">Enviar</button>
    </div>
  </div>

  <script>
    window.BLOG_CHAT_CONFIG = {
      functionUrl: 'https://yegczfbshkctxedzkdpu.supabase.co/functions/v1/chat-openrouter',
      publicKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InllZ2N6ZmJzaGtjdHhlZHprZHB1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjYyMzc1OTUsImV4cCI6MjA4MTgxMzU5NX0.GU7KfJ4J1gAGK_q_uyYNPsPWqYbXjU2qdVhZq8SsIdM',
      siteUrl: 'https://centrooculto.com',
      siteName: 'Centro Oculto',
      currentContext: {
        page: 'post',
        title: document.title,
        path: window.location.pathname,
        tag: new URLSearchParams(window.location.search).get('tag') || null
      }
    };
  </script>

  <script src="js/chat.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const postId = urlParams.get('id');

      if (!postId) {
        document.getElementById('post-container').innerHTML = '<p>Post não encontrado (sem ID na URL).</p>';
        return;
      }

      fetch('data/posts.json')
        .then(response => response.json())
        .then(posts => {
          const post = posts.find(p => p.id == postId);
          console.log('Post encontrado:', post);

          const container = document.getElementById('post-container');
          if (!post) {
            container.innerHTML = '<p>Post não encontrado.</p>';
            return;
          }

          container.innerHTML = '';
          document.title = post.title + ' | Centro Oculto';

          // PRIMEIRO: limpa o content (não depende de data)
          let cleanContent = post.content.replace(/^<h1>.*?<\/h1>\s*/i, '').trim();
          console.log('cleanContent length:', cleanContent.length);
          console.log('cleanContent starts with:', cleanContent.substring(0, 200));

          // SEGUNDO: calcula data e disclaimer (agora post existe)
          let disclaimerHTML = '';
          const postDateObj = new Date(post.date);

          if (isNaN(postDateObj.getTime())) {
            console.warn('Data inválida no post:', post.date);
            disclaimerHTML = '<div class="outdated-banner">Data de publicação inválida.</div>';
          } else {
            const now = new Date();
            const daysOld = Math.floor((now - postDateObj) / (1000 * 60 * 60 * 24));
            const isOutdated = daysOld >= 7;  // ou FRESH_DAYS se você definir como const global

            if (isOutdated) {
              const formattedDate = postDateObj.toLocaleDateString('pt-BR', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
              });

              disclaimerHTML = `
                <div class="outdated-banner">
                  <strong>Aviso importante:</strong><br>
                  Essa postagem foi feita em ${formattedDate} (${daysOld} dias atrás) e <strong>pode estar desatualizada</strong>.<br>
                  Em caso de notícias, verifique as fontes originais (linkadas no artigo) ou busque notícias recentes para o status atual.<br>
                  O Centro Oculto não se responsabiliza por decisões baseadas em informações obsoletas.
                </div>
              `;
            }
          }

          // TERCEIRO: cria postDate para o <time> (versão sem timezone issues)
          const [year, month, day] = post.date.split('-');
          const postDate = new Date(Number(year), Number(month) - 1, Number(day));
          console.log('postDate criado:', postDate.toISOString());

          // Monte o DOM
          const article = document.createElement('article');
          article.className = 'post-content';

          // ==================== HEADER + IMAGEM DESTAQUE ====================
          const header = document.createElement('div');
          header.className = 'post-header';
          header.innerHTML = `
            <h1>${post.title}</h1>
            <time datetime="${post.date}">
              ${postDate.toLocaleDateString('pt-BR', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
              })}
            </time>
            <button id="share-btn" class="share-btn">🔗 Compartilhar</button>
          `;

          // Imagem em destaque (com proteção contra posts antigos que ainda não têm o campo)
          const featuredImg = document.createElement('img');
          if (post.image) {
            featuredImg.src = post.image;
            featuredImg.alt = post.title || 'Imagem do post';
            featuredImg.className = 'featured-image';
          } else {
            // Opcional: pode deixar sem imagem ou colocar uma imagem padrão
            featuredImg.style.display = 'none';
          }

          // Monta na ordem correta
          article.appendChild(header);
          if (post.image) {
            article.appendChild(featuredImg);
          }

          // ==================== DISCLAIMER ====================
          if (disclaimerHTML) {
            const bannerDiv = document.createElement('div');
            bannerDiv.innerHTML = disclaimerHTML;
            article.appendChild(bannerDiv.firstElementChild || bannerDiv);
          }

          // Content
          const contentDiv = document.createElement('div');
          contentDiv.className = 'content';
          contentDiv.innerHTML = cleanContent;
          article.appendChild(contentDiv);

          container.appendChild(article);

          // ==================== CONTEXTO DO POST PARA O CHAT ====================
          const tempDiv = document.createElement('div');
          tempDiv.innerHTML = cleanContent;

          window.CURRENT_POST = {
            id: post.id,
            title: post.title,
            content: (tempDiv.textContent || tempDiv.innerText || '').trim(),
            tags: Array.isArray(post.tags) ? post.tags : [],
            url: window.location.href
          };         

          // ==================== SUPABASE – Likes & Comentários ====================

          const SUPABASE_URL    = 'https://yegczfbshkctxedzkdpu.supabase.co';      // ← substitua
          const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InllZ2N6ZmJzaGtjdHhlZHprZHB1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjYyMzc1OTUsImV4cCI6MjA4MTgxMzU5NX0.GU7KfJ4J1gAGK_q_uyYNPsPWqYbXjU2qdVhZq8SsIdM'; // ← substitua

          const supabaseClient = supabase.createClient(
            SUPABASE_URL,
            SUPABASE_ANON_KEY
          );
          // Função auxiliar: contar likes
          async function updateLikeCount() {
            const { count, error } = await supabaseClient
              .from('post_likes')
              .select('*', { count: 'exact', head: true })
              .eq('post_id', postId);

            if (error) {
              console.error('Erro ao contar likes:', error);
              return;
            }

            const likesEl = document.getElementById('likes-count');
            if (likesEl) likesEl.textContent = count || 0;
          }

          // Toggle like
          async function toggleLike() {
            const { error } = await supabaseClient
              .from('post_likes')
              .insert({ post_id: postId });

            if (error) {
              console.error('Erro ao registrar like:', error);
              return;
            }

            updateLikeCount();
          }

          // ==================== COMENTÁRIOS ====================

          async function loadComments() {
            const { data, error } = await supabaseClient
              .from('post_comments')
              .select('id, author_name, content, created_at')
              .eq('post_id', postId)
              .order('created_at', { ascending: true });

            if (error) {
              console.error('Erro ao carregar comentários:', error);
              return;
            }

            const container = document.getElementById('comments-list');
            container.innerHTML = '';  // limpa antes

            data.forEach(comment => {
              const div = document.createElement('div');
              div.className = 'comment-card';

              div.innerHTML = `
                <div class="comment-header">
                  <strong>${comment.author_name || 'Anônimo'}</strong>
                  <small>(${new Date(comment.created_at).toLocaleString('pt-BR', {
                    dateStyle: 'short', timeStyle: 'short'
                  })})</small>
                </div>
                <p class="comment-content">${comment.content.replace(/\n/g, '<br>')}</p>
              `;

              container.appendChild(div);
            });
          }
          
          async function submitComment() {
            const input = document.getElementById('comment-input');
            const content = input?.value.trim();

            if (!content) return;

            const name = prompt('Seu nome (ou deixe em branco para Anônimo):') || 'Anônimo';

            const { error } = await supabaseClient.from('post_comments').insert({
              post_id: postId,
              author_name: name,
              content
            });

            if (error) {
              alert('Erro ao enviar comentário: ' + error.message);
            } else {
              input.value = '';
              // O realtime vai atualizar a lista
            }
          }

          window.submitComment = submitComment;

          // ==================== REALTIME ====================

          function setupRealtime() {
            // Likes
            supabaseClient
              .channel(`likes-changes:${postId}`)
              .on('postgres_changes', 
                { event: '*', schema: 'public', table: 'post_likes', filter: `post_id=eq.${postId}` },
                () => updateLikeCount()
              )
              .subscribe();

            // Comentários novos
            supabaseClient
              .channel(`comments-changes:${postId}`)
              .on('postgres_changes', 
                { event: 'INSERT', schema: 'public', table: 'post_comments', filter: `post_id=eq.${postId}` },
                (payload) => {
                  const comment = payload.new;
                  const container = document.getElementById('comments-list');
                  const div = document.createElement('div');
                  div.className = 'comment-card';

                  div.innerHTML = `
                    <div class="comment-header">
                      <strong>${comment.author_name || 'Anônimo'}</strong>
                      <small>(${new Date(comment.created_at).toLocaleString('pt-BR', {
                        dateStyle: 'short', timeStyle: 'short'
                      })})</small>
                    </div>
                    <p class="comment-content">${comment.content.replace(/\n/g, '<br>')}</p>
                  `;
                  container.appendChild(div);
                }
              )
              .subscribe();
          }

          document.getElementById('like-btn')?.addEventListener('click', toggleLike);

          // ==================== INICIALIZAÇÃO ====================

          // Coloque isso depois de montar o article
          setTimeout(() => {
            updateLikeCount();
            loadComments();
            setupRealtime();
          }, 50);

          // Botão voltar
          const backBtn = document.createElement('button');
          backBtn.className = 'back-link-post';
          backBtn.textContent = '← Voltar para a lista de posts';
          backBtn.onclick = () => history.back();
          container.appendChild(backBtn);

          // Share
          const shareBtn = document.getElementById('share-btn');
          shareBtn.addEventListener('click', () => {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
              const original = shareBtn.innerHTML;
              shareBtn.innerHTML = '✅ Link copiado!';
              shareBtn.style.background = 'var(--neon-green)';
              shareBtn.style.color = '#000';
              setTimeout(() => {
                shareBtn.innerHTML = original;
                shareBtn.style.background = '';
                shareBtn.style.color = '';
              }, 2200);
            }).catch(() => {
              alert('Erro ao copiar o link. Tente novamente.');
            });
          });      

          console.log('Montagem do DOM concluída sem erro');
        })
        .catch(error => {
          console.error('Catch acionado com erro:', error);
          document.getElementById('post-container').innerHTML =
            '<p>Erro ao carregar o post.</p>';
        });
    });
  </script>



</body>
</html>
